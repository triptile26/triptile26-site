<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TripTile - 크레스티드 게코 분양</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#fafafa;
      color:#111;
      line-height:1.6;
    }

    header{
      position:sticky;
      top:0;
      background:white;
      border-bottom:1px solid #eee;
      padding:15px 20px;
      z-index:100;
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:0 20px;
    }

    .top-profile{
      text-align:center;
      padding:40px 20px 20px;
    }

    .top-profile img{
      width:110px;
      height:110px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 8px 25px rgba(0,0,0,0.1);
      margin-bottom:15px;
    }

    .hero-content{
      text-align:center;
      padding:20px;
    }

    .hero-content h1{
      font-size:42px;
      line-height:1.1;
      margin-bottom:20px;
    }

    .hero-content p{
      font-size:17px;
      color:#333;
      max-width:700px;
      margin:0 auto 25px;
    }

    .contact-box{
      background:#f0f8f0;
      padding:25px;
      border-radius:20px;
      max-width:500px;
      margin:30px auto;
      text-align:left;
    }

    .section-title{
      font-size:38px;
      text-align:center;
      margin:70px 0 20px;
    }

    .sub{
      text-align:center;
      color:#555;
      font-size:17px;
      margin-bottom:50px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
      gap:30px;
    }

    .card{
      border:1px solid #eee;
      border-radius:28px;
      overflow:hidden;
      background:white;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow:0 20px 40px rgba(0,0,0,0.1);
    }

    .image-container{
      position:relative;
      background:#f8f8f8;
      padding:10px 0;
    }

    .card img{
      width:100%;
      height:auto;
      max-height:380px;
      object-fit:contain;
      display:block;
      margin:0 auto;
    }

    .slide-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:rgba(0,0,0,0.6);
      color:white;
      border:none;
      padding:10px 14px;
      cursor:pointer;
      z-index:10;
      border-radius:50%;
    }

    .prev{
      left:15px;
    }

    .next{
      right:15px;
    }

    .card-content{
      padding:25px;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 18px;
      border-radius:999px;
      font-size:15px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .sale{
      background:#16a34a;
      color:white;
    }

    .sold{
      background:#444;
      color:white;
    }

    .detail{
      margin:6px 0;
      color:#444;
    }

    textarea{
      width:100%;
      height:110px;
      border:1px solid #ddd;
      border-radius:16px;
      padding:15px;
      resize:none;
      margin:15px 0;
    }

    .send,
    .adopt-btn{
      width:100%;
      padding:14px;
      margin-top:8px;
      border:none;
      border-radius:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .send{
      background:#16a34a;
      color:white;
    }

    .adopt-btn{
      background:#8b5cf6;
      color:white;
    }

    .admin-btn{
      position:fixed;
      bottom:30px;
      right:30px;
      padding:14px 24px;
      background:#111;
      color:white;
      border-radius:50px;
      cursor:pointer;
      z-index:1000;
      font-weight:bold;
    }

    footer{
      background:#f7f7f7;
      padding:60px 20px;
      text-align:center;
      margin-top:100px;
    }
  </style>
</head>

<body>

<div class="top-profile">

</html>
