<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TripTile</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:sans-serif;
    }

    body{
      background:#fafafa;
      color:#111;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
    }

    .top-profile{
      text-align:center;
      padding:40px 20px 10px;
    }

    .top-profile img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

    header{
      text-align:center;
      padding:20px;
      background:white;
      border-bottom:1px solid #eee;
    }

    .hero{
      text-align:center;
      padding:50px 20px;
    }

    .hero h1{
      font-size:42px;
      margin-bottom:20px;
    }

    .hero p{
      color:#555;
      margin-bottom:20px;
      line-height:1.7;
    }

    .contact-box{
      background:#f0f8f0;
      max-width:500px;
      margin:30px auto;
      padding:25px;
      border-radius:20px;
      text-align:left;
    }

    .buttons{
      margin-top:25px;
    }

    .buttons a{
      display:inline-block;
      margin:5px;
      padding:14px 24px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
    }

    .call-btn{
      background:#111;
      color:white;
    }

    .insta-btn{
      border:2px solid #111;
      color:#111;
    }

    .section-title{
      text-align:center;
      font-size:38px;
      margin:60px 0 10px;
    }

    .sub{
      text-align:center;
      color:#666;
      margin-bottom:40px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
      margin-bottom:80px;
    }

    .card{
      background:white;
      border-radius:24px;
      overflow:hidden;
      border:1px solid #eee;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 35px rgba(0,0,0,0.1);
    }

    .image-container{
      position:relative;
      background:#f7f7f7;
      padding:10px;
    }

    .card img{
      width:100%;
      max-height:350px;
      object-fit:contain;
      display:none;
    }

    .slide-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      border:none;
      background:rgba(0,0,0,0.6);
      color:white;
      padding:10px 14px;
      border-radius:50%;
      cursor:pointer;
    }

    .prev{
      left:10px;
    }

    .next{
      right:10px;
    }

    .card-content{
      padding:22px;
    }

    .status{
      display:inline-block;
      padding:8px 16px;
      border-radius:999px;
      color:white;
      font-weight:bold;
      margin-bottom:15px;
    }

    .sale{
      background:#16a34a;
    }

    .sold{
      background:#444;
    }

    .detail{
      margin:7px 0;
      color:#444;
    }

    textarea{
      width:100%;
      height:100px;
      border:1px solid #ddd;
      border-radius:14px;
      padding:14px;
      resize:none;
      margin-top:15px;
    }

    .send,
    .adopt-btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      margin-top:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .send{
      background:#16a34a;
      color:white;
    }

    .adopt-btn{
      background:#8b5cf6;
      color:white;
    }

    .admin-btn{
      position:fixed;
      right:25px;
      bottom:25px;
      background:#111;
      color:white;
      padding:14px 24px;
      border-radius:50px;
      cursor:pointer;
      z-index:1000;
      font-weight:bold;
    }

    footer{
      background:#f7f7f7;
      text-align:center;
      padding:60px 20px;
    }
  </style>
</head>

<body>

<div class="top-profile">
  <img id="mainLogo" src="https://i.imgur.com/2DhmtJ4.png">
</div>

<header>
  <h2>TripTile</h2>
  <p>크레스티드 게코 분양</p>
</header>

<section class="hero container">

  <h1>건강하고 순한<br>크레스티드 게코 분양</h1>

  <p>
    입문자분들을 위한 건강하고 순한 개체 위주로 분양합니다.
  </p>

  <div class="contact-box">
    <p><strong>📞 010-2480-6369</strong></p>
    <p><strong>📷 @trip_tile26</strong></p>

    <p style="margin-top:15px;color:#16a34a;font-weight:bold;">
      문자 또는 인스타 DM 주시면 빠르게 답장드립니다.
    </p>
  </div>

  <p>
    부산 명지국제 직접 방문 가능
  </p>

  <div class="buttons">
    <a class="call-btn" href="tel:01024806369">
      📞 전화하기
    </a>

    <a class="insta-btn"
       href="https://instagram.com/trip_tile26"
       target="_blank">
      📩 인스타 DM
    </a>
  </div>

</section>

<section class="container">

  <h2 class="section-title">
    현재 분양 개체
  </h2>

  <p class="sub">
    입문자 추천 • 건강한 개체 • 직접 확인 가능
  </p>

  <div class="grid" id="geckoGrid"></div>

</section>

<div class="admin-btn" onclick="adminLogin()">
  관리자
</div>

<footer>
  <h2>TripTile</h2>

  <p style="margin-top:20px;">
    📞 010-2480-6369<br>
    📩 @trip_tile26
  </p>
</footer>

<script src="app.js"></script>

</body>
</html>
